# Community events — data, not documents.
#
# Events are structured, time-based records, so they live here as a single
# list rather than one markdown file each. The website's `events` block reads
# this file and renders upcoming or past events.
#
# Each entry:
#   title    (required) — the event name
#   start    (required) — ISO 8601 datetime, e.g. 2026-06-12T17:00:00Z
#   end      (optional) — ISO 8601 datetime
#   kind     (required) — irl | video-call | discord-call
#   location (optional) — where it happens (venue, "Online", a Discord channel)
#   url      (optional) — link to join / RSVP / details
#   summary  (optional) — one line on what it is

